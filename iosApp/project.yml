name: PramanikOTT
options:
  bundleIdPrefix: org.gunayatan
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "16.0"

settings:
  base:
    MARKETING_VERSION: "4.0.0"
    CURRENT_PROJECT_VERSION: "2"
    DEVELOPMENT_TEAM: "9C9EZRD3AT"
    CODE_SIGN_STYLE: Manual

targets:
  PramanikOTT:
    type: application
    platform: iOS
    sources:
      - path: PramanikOTT
        type: group
        excludes:
          - "**/*.plist"
    resources:
      - path: PramanikOTT/GoogleService-Info.plist
      - path: PramanikOTT/Info.plist
        buildPhase: none
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.gunayatan.pramanik
        INFOPLIST_FILE: PramanikOTT/Info.plist
        CODE_SIGN_ENTITLEMENTS: PramanikOTT/PramanikOTT.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    scheme:
      testTargets: []
      gatherCoverageData: false
    # Crashlytics build phase - enable after first successful build
    # postCompileScripts:
    #   - script: |
    #       "${PODS_ROOT}/FirebaseCrashlytics/run"
    #     name: Firebase Crashlytics
