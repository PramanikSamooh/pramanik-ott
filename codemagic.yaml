workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: org.gunayatan.pramanik
      vars:
        XCODE_SCHEME: "PramanikOTT"
        BUNDLE_ID: "org.gunayatan.pramanik"
      xcode: latest
      cocoapods: default
    scripts:
      - name: Generate Xcode project
        script: |
          brew install xcodegen
          cd iosApp
          xcodegen generate
      - name: Install CocoaPods
        script: |
          cd iosApp
          pod install
      - name: Set up code signing
        script: |
          xcode-project use-profiles
      - name: Build iOS
        script: |
          cd iosApp
          xcodebuild build -workspace PramanikOTT.xcworkspace \
            -scheme PramanikOTT \
            -sdk iphoneos \
            -configuration Release \
            -archivePath build/PramanikOTT.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="iPhone Distribution" \
            DEVELOPMENT_TEAM="${DEVELOPMENT_TEAM}"
      - name: Export IPA
        script: |
          xcodebuild -exportArchive \
            -archivePath iosApp/build/PramanikOTT.xcarchive \
            -exportPath iosApp/build \
            -exportOptionsPlist iosApp/exportOptions.plist
    artifacts:
      - iosApp/build/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true

  android-release:
    name: Android Release
    max_build_duration: 60
    instance_type: linux_x2
    environment:
      vars:
        RELEASE_STORE_PASSWORD: $RELEASE_STORE_PASSWORD
        RELEASE_KEY_PASSWORD: $RELEASE_KEY_PASSWORD
        RELEASE_KEY_ALIAS: pramanik
        RELEASE_STORE_FILE: ../../signature1.jks
    scripts:
      - name: Build AAB
        script: |
          ./gradlew bundleRelease
    artifacts:
      - app/build/outputs/bundle/release/*.aab
